<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAWx_ARCHIVE_ENGINE // MAXIMUM</title>
<style>
:root { --black:#0b0b0b; --white:#f4f4f4; --gray:#1a1a1a; --yellow:#ffe000; --red:#ff2020; --border:2px solid #333; --mono:'Courier New', Courier, monospace; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { background: var(--black); color: var(--white); font-family: var(--mono); margin: 0; cursor: crosshair; overflow-x: hidden; }
button, input { font-family: var(--mono); cursor: crosshair; }
::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-thumb { background: var(--yellow); }
svg.icon { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; display: block; }

/* Brutalist Header & Toolbar */
.site-header { background: #000; padding: 20px; border-bottom: var(--border); display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 10px; }
.site-title { font-size: 3rem; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; line-height: 0.8; margin: 0; }
.site-title span { color: var(--yellow); }
.counter-badge { font-size: 11px; letter-spacing: 2px; color: var(--yellow); text-transform: uppercase; }

.toolbar { position: sticky; top: 0; background: #111; border-bottom: var(--border); display: flex; z-index: 100; overflow-x: auto; align-items: stretch; }
.btn { padding: 12px 18px; border: none; border-right: var(--border); background: transparent; color: #888; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
.btn:hover { color: var(--white); background: #222; }
.btn.active { background: var(--yellow); color: var(--black); font-weight: bold; }
.btn.view-btn.active { background: var(--red); color: var(--white); }
.search-wrap { display: flex; align-items: center; gap: 8px; border-right: var(--border); padding: 0 14px; color: #888; background: #111; }
.search-wrap input { border: none; background: none; outline: none; font-size: 12px; width: 150px; text-transform: uppercase; color: var(--white); font-weight: bold; }

.tagbar { display: flex; background: #0a0a0a; overflow-x: auto; border-bottom: var(--border); }
.tag-chip { padding: 12px 20px; border-right: 1px solid #222; color: #666; display: flex; align-items: center; gap: 8px; white-space: nowrap; font-size: 11px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; transition: 0.2s; cursor: pointer; }
.tag-chip:hover { color: var(--white); background: #1a1a1a; }
.tag-chip.active { background: var(--yellow); color: var(--black); border-right-color: var(--yellow); }
.tag-count { opacity: .7; font-size: 10px; }

/* Maximum Gallery Engine */
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 4px; background: var(--black); border: 4px solid var(--black); min-height: 50vh; }
.gallery.masonry { display: block; columns: 320px; column-gap: 4px; }
.gallery.masonry .card { break-inside: avoid; margin-bottom: 4px; aspect-ratio: auto; }
.gallery.list { display: block; }
.gallery.list .card { aspect-ratio: auto; display: flex; align-items: center; border-bottom: 2px solid #222; background: #111; }
.gallery.list .card .media-wrap { width: 140px; height: 100px; flex-shrink: 0; }
.gallery.list .card-meta { position: static; opacity: 1; background: none; padding: 12px 16px; color: var(--white); border: none; }

.card { position: relative; background: var(--gray); overflow: hidden; aspect-ratio: 1; border: 1px solid #222; }
.media-wrap { position: relative; width: 100%; height: 100%; cursor: zoom-in; }
.card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(30%) contrast(1.1); transition: transform .4s ease, filter .4s ease; display: block; opacity: 0; }
.card img.loaded { opacity: 1; }
.card:hover img { transform: scale(1.05); filter: grayscale(0%) contrast(1.2); }
.card-meta { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,.9); border-top: 1px solid var(--yellow); color: var(--yellow); padding: 12px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0; transition: opacity .2s; pointer-events: none; display: flex; justify-content: space-between; align-items: flex-end; font-weight: bold; }
.card:hover .card-meta { opacity: 1; }
.empty-state { color: #666; text-transform: uppercase; font-size: 12px; padding: 60px 20px; text-align: center; grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; gap: 12px; }

/* Cinematic Lightbox + Filmstrip + B2B */
#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.98); z-index: 1000; flex-direction: column; }
.lb-top { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; color: var(--yellow); font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #222; background: #000; }
.lb-actions { display: flex; gap: 8px; }
.lb-btn { background: none; border: 1px solid #444; color: var(--white); padding: 8px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.lb-btn:hover { background: var(--yellow); color: var(--black); border-color: var(--yellow); }
.lb-close:hover { background: var(--red); border-color: var(--red); color: var(--white); }

.lb-stage { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; padding: 0 70px; }
.lb-stage img { max-width: 100%; max-height: 70vh; outline: 2px solid #333; cursor: zoom-in; transition: transform .3s ease; }
.lb-stage img.zoomed { max-width: none; max-height: none; height: 130vh; cursor: zoom-out; }

.lb-nav { position: absolute; top: 0; bottom: 0; width: 70px; background: none; border: none; color: var(--white); display: flex; align-items: center; justify-content: center; opacity: .3; transition: 0.2s; }
.lb-nav svg { width: 32px; height: 32px; }
.lb-nav:hover { opacity: 1; background: rgba(255,255,255,.05); }
.lb-nav.prev { left: 0; } .lb-nav.next { right: 0; }

.lb-metadata { background: #0a0a0a; padding: 15px 20px; border-top: 1px solid #222; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
.meta-prompt { font-size: 10px; color: #666; letter-spacing: 1px; max-width: 70%; line-height: 1.4; }
.meta-prompt span { color: var(--white); font-weight: bold; }
.b2b-btn { background: var(--yellow); color: var(--black); border: none; padding: 12px 24px; font-family: var(--mono); font-weight: bold; font-size: 12px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
.b2b-btn:hover { background: var(--white); }

.filmstrip { display: flex; gap: 4px; overflow-x: auto; padding: 15px 20px; background: #000; border-top: 1px solid #111; }
.fs-thumb { width: 60px; height: 60px; object-fit: cover; opacity: .3; filter: grayscale(80%); flex-shrink: 0; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
.fs-thumb:hover { opacity: 0.8; }
.fs-thumb.active { opacity: 1; filter: grayscale(0%); border-color: var(--yellow); }

@media (max-width: 768px) {
  .site-title { font-size: 2rem; }
  .lb-stage { padding: 0 40px; }
  .lb-nav { width: 40px; }
  .lb-nav svg { width: 24px; height: 24px; }
  .filmstrip { display: none; }
  .meta-prompt { max-width: 100%; }
}
</style>
</head>

<header class="site-header">

    <div class="counter-badge" id="counter-badge">SYSTEM LOADED</div>

    { key: 'panty',       label: 'PANTY / THONG' },

let photos = rawFiles.map((filename, i) => {
    const lower = filename.toLowerCase();
    let kind = 'scrap';

    if (lower.includes('hunkemoller')) kind = 'hunkemoller';
    else if (lower.includes('2set') || lower.includes('2-piece')) kind = 'twoset';
    else if (lower.includes('activewear')) kind = 'activewear';
    else if (lower.includes('bodysuit')) kind = 'bodysuit';
    else if (lower.includes('lingerie') || lower.includes('luxury')) kind = 'lingerie';
    else if (lower.includes('panty') || lower.includes('thong')) kind = 'panty';
    else if (lower.includes('ig') || lower.includes('pin')) kind = 'social';
    else if (lower.includes('essential')) kind = 'essential';

    return { 
        id: i, 
        title: filename.replace(/\.[^/.]+$/, ""), // এক্সটেনশন রিমুভ করে সুন্দর নাম দেখাবে
        kind: kind, 
        file: filename,
        src: BASE + encodeURIComponent(filename), 
        score: Math.round(Math.random() * 100),
        video: /\.(mp4|webm|mov)$/i.test(filename) 
    };
});

/* 3. ENGINE STATE */
let state = { mode: 'all', view: 'grid', tag: null, query: '' };
let activeSet = photos;
let lbIndex = 0;
let zoomed = false;

function getFiltered() {
    let data = [...photos];
    if (state.mode === 'pop') data.sort((a, b) => b.score - a.score);
    if (state.mode === 'az') data.sort((a, b) => a.title.localeCompare(b.title));
    if (state.tag) data = data.filter(p => p.kind === state.tag);
    if (state.query) { 
        const q = state.query.toLowerCase(); 
        data = data.filter(p => p.title.toLowerCase().includes(q) || p.file.toLowerCase().includes(q)); 
    }
    return data;
}

                <div class="card-meta"><span>${p.title}</span> <span>[+]</span></div>
            `;
            grid.appendChild(div);
        });
    }
    document.getElementById('counter-badge').textContent = `VISIBLE PROTOCOLS: ${activeSet.length} // ${photos.length}`;
}

function setMode(mode) { state.mode = mode; render(); }
function setView(view) { state.view = view; render(); }
function onSearch(val) { state.query = val.trim(); render(); }

/* 5. MAXIMUM LIGHTBOX & FILMSTRIP LOGIC */
function initLbIcons() {
    document.getElementById('lb-fullscreen').innerHTML = icon('fullscreen');
    document.getElementById('lb-download').innerHTML = icon('download');
    document.querySelector('.lb-close').innerHTML = icon('close');
    document.querySelector('.lb-nav.prev').innerHTML = icon('prev');
    document.querySelector('.lb-nav.next').innerHTML = icon('next');
}

function openLb(id) {
    lbIndex = activeSet.findIndex(p => p.id === id);
    zoomed = false;
    document.getElementById('lightbox').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    showLbFrame();
}

function showLbFrame() {
    const p = activeSet[lbIndex];
    const holder = document.getElementById('lb-media-holder');
    
    holder.innerHTML = `<img src="${p.src}" onclick="this.classList.toggle('zoomed')">`;
    document.getElementById('lb-title').textContent = `ASSET // ${p.title.toUpperCase()}`;
    
    // Dynamic Metadata Prompt based on category
    let techPrompt = "8K resolution, Hasselblad quality, 85mm lens simulation, brutalist industrial realism";
    if(p.kind === 'hunkemoller') techPrompt = "Commercial fashion photography, Hunkemoller catalog spec, hyper-detailed fabric textures, studio lighting";
    else if(p.kind === 'activewear') techPrompt = "High contrast athletic wear presentation, dynamic lighting, utilitarian aesthetic, RAWx technical blueprint";
    
    document.getElementById('lb-prompt-text').textContent = techPrompt;
    
    const dlBtn = document.getElementById('lb-download');
    dlBtn.href = p.src;
    dlBtn.setAttribute('download', p.title);
    
    renderFilmstrip();
}

function renderFilmstrip() {
    const strip = document.getElementById('filmstrip');
    strip.innerHTML = '';
    activeSet.forEach((p, i) => {
        const el = document.createElement('img');
        el.className = 'fs-thumb' + (i === lbIndex ? ' active' : '');
        el.src = p.src;
        el.onclick = () => { lbIndex = i; zoomed = false; showLbFrame(); };
        strip.appendChild(el);
    });
    const activeThumb = strip.querySelector('.active');
    if (activeThumb) activeThumb.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
}

function navLb(dir) { 
    lbIndex = (lbIndex + dir + activeSet.length) % activeSet.length; 
    zoomed = false; 
    showLbFrame(); 
}

function closeLb() {
    document.getElementById('lightbox').style.display = 'none';
    document.getElementById('lb-media-holder').innerHTML = '';
    document.body.style.overflow = '';
    if (document.fullscreenElement) document.exitFullscreen();
}

function toggleFullscreen() {
    const lb = document.getElementById('lightbox');
    if (!document.fullscreenElement) lb.requestFullscreen?.();
    else document.exitFullscreen?.();
}

/* KEYBOARD NAVIGATION */
document.addEventListener('keydown', e => {
    if (document.getElementById('lightbox').style.display !== 'flex') return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowRight') navLb(1);
    if (e.key === 'ArrowLeft') navLb(-1);
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

/* SWIPE LOGIC FOR MOBILE */
let touchStartX = 0;
document.getElementById('lb-stage').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.getElementById('lb-stage').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) navLb(dx > 0 ? -1 : 1);
});

initLbIcons();
render();
</script>
</body>
