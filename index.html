<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAWx_ARCHIVE_OS // B2B ENGINE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0a0a0a; --void2:#131313; --panel:#1a1a1a; --line:#2a2a2a;
  --white:#f2f2f2; --dim:#8a8a8a; --dim2:#5c5c5c;
  --yellow:#ffe000; --red:#ff2e2e; --amber:#ffb020;
  --mono:'JetBrains Mono','Courier New',monospace;
  --dur:.18s;
  /* motion system */
  --spring: cubic-bezier(.34,1.56,.64,1);
  --spring-soft: cubic-bezier(.22,1.12,.36,1);
  --out: cubic-bezier(.16,1,.3,1);
  --snap: cubic-bezier(.7,0,.3,1);
  --stagger-step: 16ms;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--void);color:var(--white);font-family:var(--mono);margin:0;cursor:crosshair;}
button,input{font-family:var(--mono);cursor:crosshair;}

/* ============ REDUCED MOTION ============ */
@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{
    animation-duration:.001ms !important;
    animation-iteration-count:1 !important;
    transition-duration:.001ms !important;
    scroll-behavior:auto !important;
  }
  .card{ opacity:1 !important; }
}
svg.icon{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;display:block;}
::selection{background:var(--yellow);color:var(--void);}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-track{background:var(--void2);}
::-webkit-scrollbar-thumb{background:var(--line);}
::-webkit-scrollbar-thumb:hover{background:var(--yellow);}

/* ============ BRUTALIST HEADER ============ */
.site-header{background:var(--void);border-bottom:1px solid var(--line);padding:24px 22px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;position:relative;}
.site-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--yellow),transparent 40%,var(--red) 70%,transparent);}
.brand{display:flex;flex-direction:column;gap:4px;}
.site-title{font-size:2.8rem;font-weight:800;text-transform:uppercase;letter-spacing:-2px;line-height:.85;}
.site-title span{color:var(--yellow);}
.brand-sub{font-size:10px;letter-spacing:3px;color:var(--yellow);text-transform:uppercase;}
.header-stats{display:flex;gap:22px;flex-wrap:wrap;}
.hstat{display:flex;flex-direction:column;gap:2px;min-width:64px;}
.hstat b{font-size:1.3rem;font-weight:800;color:var(--white);line-height:1;}
.hstat span{font-size:9px;letter-spacing:1.5px;color:var(--dim2);text-transform:uppercase;}
.hstat.accent b{color:var(--yellow);}

/* ============ TOOLBAR ============ */
.toolbar{position:sticky;top:0;background:var(--void2);border-bottom:1px solid var(--line);display:flex;z-index:100;overflow-x:auto;align-items:stretch;backdrop-filter:blur(6px);}

/* Brutalist button base: sharp edges, GPU-accelerated, magnetic-ready */
.btn, .tag-chip, .board-chip, .lb-btn, .b2b-btn{
  transform:translateZ(0);
  transition:background var(--dur) var(--out), color var(--dur) var(--out), border-color var(--dur) var(--out), transform .22s var(--spring), box-shadow .22s var(--out);
  position:relative;
}
.btn{padding:12px 16px;border:none;border-right:1px solid var(--line);background:transparent;color:var(--dim);display:flex;align-items:center;gap:7px;font-size:10px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
.btn:hover{background:var(--panel);color:var(--white);}
.btn.active{background:var(--yellow);color:var(--void);font-weight:700;box-shadow:inset 0 0 0 1px #000;}
.btn.view-btn.active{background:var(--red);color:var(--white);}
.btn.fav-btn.active{background:var(--yellow);color:var(--void);}
.btn:active, .tag-chip:active, .board-chip:active, .lb-btn:active, .b2b-btn:active{
  transform:translateZ(0) scale(.94);
  transition-duration:.08s;
}
/* One-shot glitch pulse on hover-in */
@keyframes glitchPulse{
  0%{ clip-path:inset(0 0 0 0); }
  18%{ clip-path:inset(8% 0 62% 0); transform:translate3d(-2px,0,0); }
  36%{ clip-path:inset(58% 0 6% 0); transform:translate3d(2px,0,0); }
  54%{ clip-path:inset(28% 0 42% 0); transform:translate3d(-1px,0,0); }
  72%{ clip-path:inset(4% 0 72% 0); transform:translate3d(1px,0,0); }
  100%{ clip-path:inset(0 0 0 0); transform:translate3d(0,0,0); }
}
.btn:hover, .tag-chip:hover, .board-chip:hover, .lb-btn:hover, .b2b-btn:hover{
  animation:glitchPulse .26s steps(5);
}
.search-wrap{display:flex;align-items:center;gap:8px;border-right:1px solid var(--line);padding:0 14px;color:var(--dim2);}
.search-wrap input{border:none;background:none;outline:none;font-size:12px;width:150px;color:var(--white);font-weight:bold;transition:width .2s var(--out);}
.search-wrap input::placeholder{color:var(--dim2);font-weight:normal;}
.search-wrap input:focus{width:190px;}
#status{margin-left:auto;padding:12px 16px;font-size:9px;align-self:center;text-transform:uppercase;white-space:nowrap;color:var(--dim2);letter-spacing:1px;}

/* ============ TAGBAR & BOARDBAR ============ */
.tagbar{display:flex;background:var(--void);overflow-x:auto;border-bottom:1px solid var(--line);}
.tag-chip{padding:12px 16px;border-right:1px solid var(--line);background:var(--void);color:var(--dim);display:flex;align-items:center;gap:7px;white-space:nowrap;font-size:10px;letter-spacing:1px;text-transform:uppercase;}
.tag-chip:hover{color:var(--white);background:var(--void2);}
.tag-chip.active{background:var(--yellow);color:var(--void);font-weight:700;box-shadow:inset 0 0 0 1px #000;}
.tag-count{opacity:.6;font-size:9px;}
.tag-chip.active .tag-count{opacity:.9; color: var(--void);}

.boardbar{display:flex;background:var(--void);overflow-x:auto;border-bottom:1px solid var(--line);}
.boardbar:empty{display:none;}
.board-chip{padding:9px 8px 9px 14px;border-right:1px solid var(--line);background:var(--void);color:var(--dim);display:flex;align-items:center;gap:8px;white-space:nowrap;font-size:10px;letter-spacing:.5px;text-transform:uppercase;}
.board-chip:hover{color:var(--white);background:var(--void2);}
.board-chip.active{background:var(--red);color:var(--white);font-weight:700;box-shadow:inset 0 0 0 1px #000;}
.board-chip-label{cursor:pointer;display:flex;align-items:center;gap:7px;}
.board-chip-del{opacity:.5;padding:4px;display:flex;transition:transform .18s var(--spring),color .15s;}
.board-chip-del:hover{opacity:1;color:var(--red);transform:scale(1.15) rotate(-4deg);}

/* ============ GALLERY ============ */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2px;background:var(--line);border-top:1px solid var(--line);min-height:50vh;}
.gallery.masonry{display:block;columns:280px;column-gap:2px;}
.gallery.masonry .card{break-inside:avoid;margin-bottom:2px;aspect-ratio:auto;}
.gallery.list{display:block;}
.gallery.list .card{aspect-ratio:auto;display:flex;align-items:center;border-bottom:1px solid var(--line);}
.gallery.list .card .media-wrap{width:140px;height:100px;flex-shrink:0;}
.gallery.list .card-meta{position:static;opacity:1;background:none;padding:10px 14px;color:var(--white);transform:none;flex:1;}

.card{
  position:relative;background:var(--void2);overflow:hidden;aspect-ratio:1;
  transform:translateZ(0);
  will-change:transform;
  content-visibility:auto;
  contain-intrinsic-size:280px 280px;
  contain:layout paint style;
  opacity:0;
  animation:cardReveal .5s var(--out) both;
  animation-delay:calc(var(--i,0) * var(--stagger-step));
}
@keyframes cardReveal{
  0%{ opacity:0; transform:translate3d(0,10px,0) scale(.97); clip-path:inset(0 0 30% 0); filter:blur(3px); }
  55%{ opacity:1; clip-path:inset(0 0 0 0); filter:blur(0); }
  100%{ opacity:1; transform:translate3d(0,0,0) scale(1); }
}
.media-wrap{position:relative;width:100%;height:100%;background:linear-gradient(110deg,#161616 30%,#1e1e1e 50%,#161616 70%);background-size:200% 100%;animation:shimmer 1.4s infinite;transform:translateZ(0);}
.media-wrap.loaded{animation:none;background:none;}
@keyframes shimmer{to{background-position-x:-200%;}}
.card img,.card video{width:100%;height:100%;object-fit:cover;filter:grayscale(35%) contrast(1.1);transition:transform .4s var(--out),filter .4s var(--out);display:block;cursor:zoom-in;opacity:0;will-change:transform,filter;transform:translateZ(0) scale(1);backface-visibility:hidden;}
.card img.loaded,.card video.loaded{opacity:1;}
.card:hover img,.card:hover video{transform:translateZ(0) scale(1.05);filter:grayscale(0%) contrast(1.2);}
.gallery.list .card:hover img{transform:translateZ(0) scale(1);}
.card-meta{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.95)); border-top: 1px solid var(--yellow); color:var(--white);padding:24px 10px 10px;font-size:9px;text-transform:uppercase;letter-spacing:1px;opacity:0;transform:translate3d(0,4px,0);transition:opacity .2s var(--out),transform .25s var(--out);pointer-events:none;display:flex;justify-content:space-between;align-items:flex-end;}
.card:hover .card-meta{opacity:1;transform:translate3d(0,0,0);}
.cat-icon{color:var(--yellow);opacity:.9;flex-shrink:0;}

/* Card Badges (Fav/Pin) */
.fav-toggle, .pin-toggle { position:absolute; z-index:3; background:rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.2); color:var(--white); width:28px; height:28px; display:flex; align-items:center; justify-content:center; transition:background .18s var(--out),color .18s var(--out),border-color .18s var(--out),transform .28s var(--spring); pointer-events:auto; transform:translateZ(0); }
.fav-toggle { top:8px; left:8px; }
.pin-toggle { top:8px; right:8px; }
.fav-toggle:hover { border-color:var(--yellow); color:var(--yellow); transform:translateZ(0) scale(1.12); }
.fav-toggle.active { background:var(--yellow); color:var(--void); border-color:var(--yellow); }
.pin-toggle:hover { border-color:var(--red); color:var(--red); transform:translateZ(0) scale(1.12); }
.pin-toggle.active { background:var(--red); color:var(--white); border-color:var(--red); }
.fav-toggle.pop, .pin-toggle.pop{ animation:togglePop .38s var(--spring); }
@keyframes togglePop{
  0%{ transform:translateZ(0) scale(1); }
  40%{ transform:translateZ(0) scale(1.35) rotate(-8deg); }
  100%{ transform:translateZ(0) scale(1); }
}

/* infinite-scroll sentinel */
#sentinel{grid-column:1/-1;height:1px;}
.empty-state{color:var(--dim2);text-transform:uppercase;font-size:12px;padding:70px 20px;text-align:center;grid-column:1/-1;display:flex;flex-direction:column;align-items:center;gap:12px;}

/* ============ ULTIMATE LIGHTBOX ============ */
#lightbox{
  display:none;position:fixed;inset:0;background:rgba(5,5,5,.98);z-index:1000;flex-direction:column;
  opacity:0;transform:translateZ(0) scale(.94);will-change:opacity,transform;
  transition:opacity .26s var(--out), transform .34s var(--spring);
  pointer-events:none;
}
#lightbox.open{opacity:1;transform:translateZ(0) scale(1);pointer-events:auto;}
.lb-top{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;color:var(--yellow);font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid var(--line); background:#000;}
.lb-actions{display:flex;gap:8px;}
.lb-btn{background:none;border:1px solid var(--line);color:var(--white);padding:8px;display:flex;align-items:center;justify-content:center;}
.lb-btn:hover{background:var(--yellow);color:var(--void);border-color:var(--yellow);}
.lb-btn.active{background:var(--yellow);color:var(--void);border-color:var(--yellow);}
.lb-btn-text{font-size:10px;font-weight:700;letter-spacing:.5px;padding:8px 10px;min-width:34px;}
.lb-close:hover{background:var(--red);border-color:var(--red);color:var(--white);}

.lb-stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;padding:0 70px;transform:translateZ(0);}
.lb-stage img, .lb-stage video{max-width:100%;max-height:72vh;outline:2px solid #222;cursor:zoom-in;transition:transform .3s var(--out);transform:translateZ(0);will-change:transform;animation:lbMediaIn .35s var(--spring) both;}
.lb-stage img.zoomed{max-width:none;max-height:none;height:130vh;cursor:zoom-out;}
@keyframes lbMediaIn{
  0%{ opacity:0; transform:translateZ(0) scale(.9); }
  100%{ opacity:1; transform:translateZ(0) scale(1); }
}
.lb-nav{position:absolute;top:0;bottom:0;width:70px;background:none;border:none;color:var(--white);display:flex;align-items:center;justify-content:center;opacity:.4;transition:opacity .18s var(--out),background .18s var(--out);}
.lb-nav svg{width:32px;height:32px;transition:transform .22s var(--spring);}
.lb-nav:hover{opacity:1;background:rgba(255,255,255,.05);}
.lb-nav.prev:hover svg{transform:translateX(-4px);}
.lb-nav.next:hover svg{transform:translateX(4px);}
.lb-nav.prev{left:0;} .lb-nav.next{right:0;}
.lb-progress{position:absolute;top:0;left:0;height:3px;background:var(--yellow);width:0%;z-index:5;transition:none;transform:translateZ(0);}
.lb-progress.running{transition:width linear;}

/* TECH SPECS & B2B PANEL IN LIGHTBOX */
.lb-metadata-panel { background: #0a0a0a; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--line); flex-wrap: wrap; gap: 10px; border-bottom: 1px solid #111;}
.meta-prompt { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; line-height: 1.4; max-width: 70%;}
.meta-prompt strong { color: var(--yellow); }
.b2b-btn { background: var(--yellow); color: var(--void); border: none; padding: 12px 20px; font-weight: 800; font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s; display: flex; align-items:center; gap: 8px;}
.b2b-btn:hover { background: var(--white); }

.filmstrip{display:flex;gap:4px;overflow-x:auto;padding:12px 20px 20px; background: #000;}
.fs-thumb{width:60px;height:60px;object-fit:cover;opacity:.3;filter:grayscale(80%);flex-shrink:0;border:2px solid transparent; cursor:pointer;transition:opacity .18s var(--out),filter .18s var(--out),transform .22s var(--spring),border-color .18s;transform:translateZ(0);}
.fs-thumb:hover{opacity:.8;transform:translateZ(0) translateY(-3px);}
.fs-thumb.active{opacity:1;filter:grayscale(0%);border-color:var(--yellow);transform:translateZ(0) scale(1.06);}

/* Modals & Toasts */
.modal-overlay{display:flex;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s var(--out);}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal-box{background:var(--void2);border:1px solid var(--line);width:100%;max-width:360px;max-height:80vh;display:flex;flex-direction:column;transform:translateZ(0) scale(.92) translateY(8px);transition:transform .3s var(--spring);}
.modal-overlay.open .modal-box{transform:translateZ(0) scale(1) translateY(0);}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--line);font-size:11px;font-weight:bold;color:var(--white);}
.modal-head button{background:none;border:none;color:var(--dim);display:flex;}
.modal-head button:hover{color:var(--red);}
.modal-thumb-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);}
.modal-thumb-row img{width:44px;height:44px;object-fit:cover;flex-shrink:0;}
.modal-thumb-row span{font-size:10px;color:var(--yellow);text-transform:uppercase;}
.board-list{overflow-y:auto;flex:1;max-height:260px;}
.board-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer;font-size:11px;text-transform:uppercase;color:var(--dim);}
.board-row:hover{background:var(--panel);color:var(--white);}
.board-checkbox{width:16px;height:16px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;}
.board-row.checked .board-checkbox{background:var(--yellow);border-color:var(--yellow); color:var(--void);}
.board-new-row{display:flex;border-top:1px solid var(--line);}
.board-new-row input{flex:1;background:none;border:none;outline:none;color:var(--white);padding:14px;font-size:11px;text-transform:uppercase;}
.board-new-row button{background:var(--yellow);border:none;color:var(--void);padding:0 20px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--yellow);color:var(--void);padding:12px 20px;font-size:11px;font-weight:bold;text-transform:uppercase;z-index:2000;opacity:0;transition:0.2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.dash{display:none;background:var(--void2);border-bottom:1px solid var(--line);padding:16px 20px;gap:10px;flex-direction:column;}
.dash.open{display:flex;}
.dash-row{display:flex;align-items:center;gap:10px;font-size:10px;text-transform:uppercase;}
.dash-label{width:110px;color:var(--dim);flex-shrink:0;}
.dash-bar-track{flex:1;height:8px;background:var(--panel);}
.dash-bar-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--amber));transition:width .4s ease;}
.dash-num{width:36px;text-align:right;color:var(--dim2);flex-shrink:0;}
</style>
</head>
<body>

<header class="site-header">
  <div class="brand">
    <div class="site-title">RAWx<span>//</span>ENGINE</div>
    <div class="brand-sub">B2B COMMERCIAL PROTOCOL V3</div>
  </div>
  <div class="header-stats">
    <div class="hstat accent"><b id="stat-total"></b><span>Total Files</span></div>
    <div class="hstat"><b id="stat-visible"></b><span>Visible</span></div>
    <div class="hstat"><b id="stat-cats"></b><span>Tags</span></div>
    <div class="hstat"><b id="stat-fav"></b><span>Favs</span></div>
    <div class="hstat"><b id="stat-boards"></b><span>Boards</span></div>
  </div>
</header>

<div class="toolbar" id="toolbar"></div>
<div class="tagbar" id="tagbar"></div>
<div class="boardbar" id="boardbar"></div>
<div class="dash" id="dash"></div>
<div class="gallery" id="grid"></div>

<div class="modal-overlay" id="board-modal-overlay" onclick="if(event.target===this) closeBoardModal()">
  <div class="modal-box">
    <div class="modal-head">
      <span>PIN TO BOARD</span>
      <button onclick="closeBoardModal()" id="board-modal-close"></button>
    </div>
    <div class="modal-thumb-row" id="board-modal-thumb"></div>
    <div class="board-list" id="board-modal-list"></div>
    <div class="board-new-row">
      <input id="board-new-input" placeholder="CREATE NEW BOARD" maxlength="40" onkeydown="if(event.key==='Enter') submitNewBoard()">
      <button onclick="submitNewBoard()" id="board-new-btn"></button>
    </div>
  </div>
</div>

<div id="lightbox">
  <div class="lb-top">
    <div class="lb-title-wrap" style="display:flex; align-items:center; gap:10px;">
      <span class="cat-icon" id="lb-cat-icon"></span><span id="lb-title">ASSET DATA</span>
    </div>
    <div class="lb-actions">
      <button class="lb-btn" id="lb-fav" onclick="toggleFavInLb()" title="Favorite"></button>
      <button class="lb-btn" id="lb-board" onclick="openBoardModal(activeSet[lbIndex].id)" title="Pin"></button>
      <button class="lb-btn" id="lb-copy" onclick="copyLbPath()" title="Copy Link"></button>
      <button class="lb-btn lb-btn-text" id="lb-speed" onclick="cycleSpeed()" title="Slideshow Speed"></button>
      <button class="lb-btn" id="lb-play" onclick="toggleSlideshow()" title="Slideshow"></button>
      <button class="lb-btn" id="lb-fullscreen" onclick="toggleFullscreen()" title="Fullscreen"></button>
      <a class="lb-btn" id="lb-download" download title="Download"></a>
      <button class="lb-btn lb-close" onclick="closeLb()" title="Close"></button>
    </div>
  </div>
  
  <div class="lb-stage" id="lb-stage">
    <div class="lb-progress" id="lb-progress"></div>
    <button class="lb-nav prev" onclick="navLb(-1)"></button>
    <div id="lb-media-holder" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;"></div>
    <button class="lb-nav next" onclick="navLb(1)"></button>
  </div>
  
  <div class="lb-metadata-panel">
      <div class="meta-prompt">
          <strong>TECHNICAL SPECS // </strong> <br>
          <span id="lb-prompt-text">8K resolution, Hasselblad quality, 85mm lens simulation, brutalist industrial realism, hyper-detailed</span>
      </div>
      <button class="b2b-btn" onclick="window.open('https://handfilm.myshopify.com/', '_blank')">
          <svg style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          INITIATE B2B INVOICE
      </button>
  </div>

  <div class="filmstrip" id="filmstrip"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   SVG ICONS
============================================================ */
const ICONS = {

// FIX: rawFilesArray is an array of strings, so we map over it correctly!
let photos = rawFilesArray.map((filename, i) => {
    const lower = filename.toLowerCase();
    let kind = 'scrap';

    if (lower.includes('hunkemoller')) kind = 'hunkemoller';
    else if (lower.includes('2set') || lower.includes('2-piece')) kind = 'twoset';
    else if (lower.includes('activewear')) kind = 'activewear';
    else if (lower.includes('bodysuit')) kind = 'bodysuit';
    else if (lower.includes('lingerie') || lower.includes('luxury')) kind = 'lingerie';
    else if (lower.includes('panty') || lower.includes('thong')) kind = 'panty';
    else if (lower.includes('ig') || lower.includes('pin')) kind = 'social';
    else if (lower.includes('essential')) kind = 'essential';

    // ⚠️ GITHUB CASE-SENSITIVITY FIX ⚠️
    // এটি গিটহাবের জন্য ক্যাপিটাল লেটারগুলোকে স্বয়ংক্রিয়ভাবে ছোট হাতের করে দেবে
    let safeFileName = filename.replace('Hunkemoller', 'hunkemoller').replace('Lingerie', 'lingerie');

    return {
        id: i,
        title: filename.replace(/\.[^/.]+$/, ""), // এক্সটেনশন রিমুভ করবে
        kind: kind,
        file: filename,
        src: BASE + encodeURIComponent(safeFileName), // ফিক্সড URL
        video: /\.(mp4|webm|mov)$/i.test(filename)
    };
});

============================================================ */
let favorites = new Set();
try { favorites = new Set(JSON.parse(localStorage.getItem('rawx_favs') || '[]')); } catch(e){}
function saveFavs(){ try { localStorage.setItem('rawx_favs', JSON.stringify([...favorites])); } catch(e){} }

let boards = [];
let boardItems = {}; 
try {
  boards = JSON.parse(localStorage.getItem('rawx_boards') || '[]');
  const rawMap = JSON.parse(localStorage.getItem('rawx_board_map') || '{}');
  Object.keys(rawMap).forEach(k => boardItems[k] = new Set(rawMap[k]));
} catch(e){}
function saveBoards(){
  try {
    localStorage.setItem('rawx_boards', JSON.stringify(boards));
    const plain = {};
    Object.keys(boardItems).forEach(k => plain[k] = [...boardItems[k]]);
    localStorage.setItem('rawx_board_map', JSON.stringify(plain));
  } catch(e){}
}
function boardCount(id){ return boardItems[id] ? boardItems[id].size : 0; }
function createBoard(name){
  name = name.trim();
  if (!name) return null;
  const id = 'b_' + Date.now() + '_' + Math.floor(Math.random()*999);
  boards.push({ id, name });
  boardItems[id] = new Set();
  saveBoards();
  return id;
}
function deleteBoard(id){
  const b = boards.find(x => x.id === id);
  if (!b) return;
  if (!confirm(`Delete board "${b.name}"? This only removes the board, not the files.`)) return;
  boards = boards.filter(x => x.id !== id);
  delete boardItems[id];
  if (state.board === id) state.board = null;
  saveBoards();
  render();
}
function toggleBoardItem(boardId, photoId){
  if (!boardItems[boardId]) boardItems[boardId] = new Set();
  if (boardItems[boardId].has(photoId)) boardItems[boardId].delete(photoId);
  else boardItems[boardId].add(photoId);
  saveBoards();
}
function isPinnedAnywhere(photoId){
  return boards.some(b => boardItems[b.id] && boardItems[b.id].has(photoId));
}

let state = { mode:'all', view:'grid', tag:null, board:null, query:'', favOnly:false, dash:false };
let activeSet = photos;
let visibleCount = 60;
const BATCH = 60;
let lbIndex = 0;
let zoomed = false;
let io = null;

/* ============================================================
   FILTER / SORT
============================================================ */
function seededShuffle(arr, seed){
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 9301 + 49297) % 233280;
    const j = Math.floor((s / 233280) * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
let shuffleSeed = Date.now() % 100000;

function getFiltered(){
  let data = [...photos];
  if (state.board){
    const set = boardItems[state.board] || new Set();
    data = data.filter(p => set.has(p.id));
  } else if (state.tag) data = data.filter(p => p.kind === state.tag);
  if (state.favOnly) data = data.filter(p => favorites.has(p.id));
  if (state.query){
    const q = state.query.toLowerCase();
    data = data.filter(p => p.title.toLowerCase().includes(q) || p.kind.toLowerCase().includes(q) || p.file.toLowerCase().includes(q));
  }
  if (state.mode === 'az') data.sort((a,b) => a.title.localeCompare(b.title));
  else if (state.mode === 'shuffle') data = seededShuffle(data, shuffleSeed);
  else if (state.mode === 'newest') data = [...data].reverse();
  return data;
}

  tb.innerHTML = `
    <button class="btn ${state.mode==='all'?'active':''}" onclick="setMode('all')">${icon('all')}<span>All</span></button>
    <button class="btn ${state.mode==='newest'?'active':''}" onclick="setMode('newest')">${icon('newest')}<span>Newest</span></button>
    <button class="btn ${state.mode==='az'?'active':''}" onclick="setMode('az')">${icon('az')}<span>A–Z</span></button>
    <button class="btn ${state.mode==='shuffle'?'active':''}" onclick="reshuffle()">${icon('shuffle')}<span>Shuffle</span></button>
    <button class="btn fav-btn ${state.favOnly?'active':''}" onclick="toggleFavOnly()">${icon(state.favOnly?'starFill':'star')}<span>Favs</span></button>
    <button class="btn view-btn ${state.view==='grid'?'active':''}" onclick="setView('grid')">${icon('grid')}</button>
    <button class="btn view-btn ${state.view==='masonry'?'active':''}" onclick="setView('masonry')">${icon('masonry')}</button>
    <button class="btn view-btn ${state.view==='list'?'active':''}" onclick="setView('list')">${icon('list')}</button>
    <button class="btn ${state.dash?'active':''}" onclick="toggleDash()">${icon('dash')}<span>Stats</span></button>
    <div class="search-wrap">${icon('search')}<input id="search" placeholder="SEARCH FRAMES" oninput="onSearch(this.value)"></div>
    <div id="status"></div>
  `;
  document.getElementById('search').value = state.query;
}

function renderTagbar(){
  const bar = document.getElementById('tagbar');
  bar.innerHTML = '';
  const allChip = document.createElement('div');
  allChip.className = 'tag-chip' + (state.tag === null && !state.board ? ' active' : '');
  allChip.innerHTML = `${icon('all')}<span>All</span><span class="tag-count">${photos.length}</span>`;
  allChip.onclick = () => { state.tag = null; state.board = null; resetPaging(); render(); };
  bar.appendChild(allChip);
  SECTIONS.forEach(sec => {
    const count = photos.filter(p => p.kind === sec.key).length;
    if (!count) return;
    const chip = document.createElement('div');
    chip.className = 'tag-chip' + (state.tag === sec.key && !state.board ? ' active' : '');
    chip.innerHTML = `<span class="cat-icon">${icon(sec.key)}</span><span>${sec.label}</span><span class="tag-count">${count}</span>`;
    chip.onclick = () => { state.tag = (state.tag === sec.key ? null : sec.key); state.board = null; resetPaging(); render(); };
    bar.appendChild(chip);
  });
}

function renderBoardbar(){
  const bar = document.getElementById('boardbar');
  bar.innerHTML = '';
  boards.forEach(b => {
    const count = boardCount(b.id);
    const chip = document.createElement('div');
    chip.className = 'board-chip' + (state.board === b.id ? ' active' : '');
    chip.innerHTML = `
      <span class="board-chip-label">${icon('boards')}<span>${escapeHtml(b.name)}</span><span class="tag-count">${count}</span></span>
      <span class="board-chip-del">${icon('trash')}</span>
    `;
    chip.querySelector('.board-chip-label').onclick = () => {
      state.board = (state.board === b.id ? null : b.id);
      state.tag = null;
      resetPaging();
      render();
    };
    chip.querySelector('.board-chip-del').onclick = (e) => { e.stopPropagation(); deleteBoard(b.id); };
    bar.appendChild(chip);
  });
}

function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderDash(){
  const dash = document.getElementById('dash');
  dash.className = 'dash' + (state.dash ? ' open' : '');
  if (!state.dash) { dash.innerHTML = ''; return; }
  const max = Math.max(...SECTIONS.map(s => photos.filter(p => p.kind === s.key).length));
  dash.innerHTML = SECTIONS.map(sec => {
    const count = photos.filter(p => p.kind === sec.key).length;
    if (!count) return '';
    const pct = Math.round((count / max) * 100);
    return `<div class="dash-row">
      <span class="dash-label">${sec.label}</span>
      <div class="dash-bar-track"><div class="dash-bar-fill" style="width:${pct}%"></div></div>
      <span class="dash-num">${count}</span>
    </div>`;
  }).join('');
}

function mediaTag(p, forLightbox){
  if (p.video){
    return `<video src="${p.src}" ${forLightbox ? 'controls autoplay' : 'muted loop playsinline'} preload="metadata" onloadeddata="this.classList.add('loaded');this.parentElement.classList.add('loaded')"></video>`;
  }
  return `<img src="${p.src}" alt="${p.title}" loading="lazy" onload="this.classList.add('loaded');this.parentElement.classList.add('loaded')" onerror="this.parentElement.classList.add('loaded');this.alt='MISSING: ${p.file}'">`;
}

function resetPaging(){ visibleCount = BATCH; }

function render(){
  renderToolbar();
  renderDash();
  const grid = document.getElementById('grid');
  grid.className = 'gallery ' + state.view;
  grid.innerHTML = '';

  activeSet = getFiltered();

  if (!activeSet.length){
    grid.innerHTML = `<div class="empty-state">${icon('search')}<span>NO PROTOCOLS MATCH</span></div>`;
  } else {
    const slice = activeSet.slice(0, visibleCount);
    const frag = document.createDocumentFragment();
    slice.forEach((p, i) => frag.appendChild(buildCard(p, i)));
    grid.appendChild(frag);

    if (visibleCount < activeSet.length){
      const sentinel = document.createElement('div');
      sentinel.id = 'sentinel';
      grid.appendChild(sentinel);
      observeSentinel(sentinel);
    }
  }

  document.getElementById('status').textContent = `${Math.min(visibleCount, activeSet.length)} / ${activeSet.length} SHOWN`;
  document.getElementById('stat-total').textContent = photos.length;
  document.getElementById('stat-visible').textContent = activeSet.length;
  document.getElementById('stat-cats').textContent = SECTIONS.filter(s => photos.some(p => p.kind === s.key)).length;
  document.getElementById('stat-fav').textContent = favorites.size;
  document.getElementById('stat-boards').textContent = boards.length;
  renderTagbar();
  renderBoardbar();
}

function buildCard(p, staggerIndex){
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.id = p.id;
  if (typeof staggerIndex === 'number'){
    div.style.setProperty('--i', staggerIndex % 24);
  }
  const isFav = favorites.has(p.id);
  const isPinned = isPinnedAnywhere(p.id);
  div.innerHTML = `
    <button class="fav-toggle ${isFav ? 'active' : ''}" onclick="event.stopPropagation();toggleFav(${p.id})">${icon(isFav ? 'starFill' : 'star')}</button>
    <button class="pin-toggle ${isPinned ? 'active' : ''}" onclick="event.stopPropagation();openBoardModal(${p.id})">${icon('boards')}</button>
    <div class="media-wrap" onclick="openLb(${p.id})">
      ${p.video ? `<div class="video-badge">${icon('video')}</div>` : ''}
      ${mediaTag(p, false)}
    </div>
    <div class="card-meta"><span>${p.title}</span><span class="cat-icon">${icon(p.kind)}</span></div>
  `;
  return div;
}

function observeSentinel(el){
  if (io) io.disconnect();
  io = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) appendMore();
    });
  }, { rootMargin: '600px' });
  io.observe(el);
}

function appendMore(){
  const prevCount = visibleCount;
  visibleCount = Math.min(visibleCount + BATCH, activeSet.length);
  const grid = document.getElementById('grid');
  const oldSentinel = document.getElementById('sentinel');
  if (oldSentinel) oldSentinel.remove();

  const newSlice = activeSet.slice(prevCount, visibleCount);
  const frag = document.createDocumentFragment();
  newSlice.forEach((p, i) => frag.appendChild(buildCard(p, i)));
  grid.appendChild(frag);

  if (visibleCount < activeSet.length){
    const sentinel = document.createElement('div');
    sentinel.id = 'sentinel';
    grid.appendChild(sentinel);
    observeSentinel(sentinel);
  }
  document.getElementById('status').textContent = `${Math.min(visibleCount, activeSet.length)} / ${activeSet.length} SHOWN`;
  document.getElementById('stat-visible').textContent = activeSet.length;
}

function setMode(mode){ state.mode = mode; resetPaging(); render(); }
function reshuffle(){ shuffleSeed = Date.now() % 100000; state.mode = 'shuffle'; resetPaging(); render(); }
function setView(view){ state.view = view; resetPaging(); render(); }
function onSearch(val){ state.query = val.trim(); resetPaging(); render(); }
function toggleFavOnly(){ state.favOnly = !state.favOnly; resetPaging(); render(); }
function toggleDash(){ state.dash = !state.dash; render(); }
function toggleFav(id){
  if (favorites.has(id)) favorites.delete(id); else favorites.add(id);
  saveFavs();
  render();
  popToggle(id, '.fav-toggle');
  if (document.getElementById('lightbox').style.display === 'flex') updateLbFavBtn();
}

function popToggle(id, selector){
  const card = document.querySelector(`.card[data-id="${id}"]`);
  const el = card && card.querySelector(selector);
  if (!el) return;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

/* ============================================================
   TOAST
============================================================ */
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
}

/* ============================================================
   SLIDESHOW
============================================================ */
const SPEED_OPTIONS = [1.5, 2, 3, 5, 8, 12];
let speedIndex = 2; 
let slideTimer = null;
let slidePlaying = false;

function updateSpeedBtn(){
  document.getElementById('lb-speed').textContent = SPEED_OPTIONS[speedIndex] + 'S';
}
function cycleSpeed(){
  speedIndex = (speedIndex + 1) % SPEED_OPTIONS.length;
  updateSpeedBtn();
  if (slidePlaying) armSlide();
}
function updatePlayBtn(){
  const btn = document.getElementById('lb-play');
  btn.innerHTML = icon(slidePlaying ? 'pause' : 'play');
  btn.classList.toggle('active', slidePlaying);
}
function toggleSlideshow(){ slidePlaying ? stopSlideshow() : startSlideshow(); }
function startSlideshow(){ slidePlaying = true; updatePlayBtn(); armSlide(); }
function stopSlideshow(){
  slidePlaying = false;
  updatePlayBtn();
  clearTimeout(slideTimer);
  const bar = document.getElementById('lb-progress');
  bar.classList.remove('running');
  bar.style.width = '0%';
}
function armSlide(){
  clearTimeout(slideTimer);
  const secs = SPEED_OPTIONS[speedIndex];
  const bar = document.getElementById('lb-progress');
  bar.classList.remove('running');
  bar.style.width = '0%';
  void bar.offsetWidth;
  requestAnimationFrame(() => {
    bar.classList.add('running');
    bar.style.transitionDuration = secs + 's';
    bar.style.width = '100%';
  });
  slideTimer = setTimeout(() => { if (slidePlaying) navLb(1); }, secs * 1000);
}

/* ============================================================
   ADD-TO-BOARD MODAL
============================================================ */
let modalPhotoId = null;
function openBoardModal(photoId){
  modalPhotoId = photoId;
  const p = photos.find(x => x.id === photoId);
  const thumbRow = document.getElementById('board-modal-thumb');
  thumbRow.innerHTML = p.video
    ? `<div style="width:44px;height:44px;background:#222;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${icon('video')}</div><span>${p.title}</span>`
    : `<img src="${p.src}" alt=""><span>${p.title}</span>`;
  renderBoardModalList();
  document.getElementById('board-modal-overlay').classList.add('open');
  document.getElementById('board-new-input').value = '';
}
function closeBoardModal(){
  document.getElementById('board-modal-overlay').classList.remove('open');
  const pinnedId = modalPhotoId;
  modalPhotoId = null;
  render();
  if (pinnedId !== null) popToggle(pinnedId, '.pin-toggle');
  if (document.getElementById('lightbox').style.display === 'flex') updateLbFavBtn();
}
function renderBoardModalList(){
  const list = document.getElementById('board-modal-list');
  if (!boards.length){
    list.innerHTML = `<div class="board-empty-msg" style="padding:22px;text-align:center;color:var(--dim2);font-size:10px;">NO BOARDS YET — CREATE ONE BELOW</div>`;
    return;
  }
  list.innerHTML = '';
  boards.forEach(b => {
    const checked = boardItems[b.id] && boardItems[b.id].has(modalPhotoId);
    const row = document.createElement('div');
    row.className = 'board-row' + (checked ? ' checked' : '');
    row.innerHTML = `
      <span class="board-checkbox">${checked ? icon('check') : ''}</span>
      <span>${escapeHtml(b.name)}</span>
      <span style="margin-left:auto;color:var(--dim2);font-size:9px;">${boardCount(b.id)}</span>
      <span style="opacity:0.5;padding:4px;" onclick="event.stopPropagation();deleteBoard('${b.id}');renderBoardModalList();">${icon('trash')}</span>
    `;
    row.onclick = (e) => {
      if (e.target.closest('span[onclick]')) return;
      toggleBoardItem(b.id, modalPhotoId);
      renderBoardModalList();
    };
    list.appendChild(row);
  });
}
function submitNewBoard(){
  const input = document.getElementById('board-new-input');
  const name = input.value.trim();
  if (!name) return;
  const id = createBoard(name);
  if (id && modalPhotoId !== null) toggleBoardItem(id, modalPhotoId);
  input.value = '';
  renderBoardModalList();
}

/* ============================================================
   LIGHTBOX
============================================================ */
function openLb(id){
  lbIndex = activeSet.findIndex(p => p.id === id);
  zoomed = false;
  showLbFrame();
  const lb = document.getElementById('lightbox');
  lb.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  void lb.offsetWidth;
  requestAnimationFrame(() => lb.classList.add('open'));
}

function updateLbFavBtn(){
  const p = activeSet[lbIndex];
  const btn = document.getElementById('lb-fav');
  const isFav = favorites.has(p.id);
  btn.innerHTML = icon(isFav ? 'starFill' : 'star');
  btn.classList.toggle('active', isFav);
  const boardBtn = document.getElementById('lb-board');
  boardBtn.classList.toggle('active', isPinnedAnywhere(p.id));
}

function toggleFavInLb(){ toggleFav(activeSet[lbIndex].id); }

function copyLbPath(){
  const text = BASE + activeSet[lbIndex].file;
  if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => showToast('PATH COPIED'));
  else showToast('COPY UNSUPPORTED');
}

function getTechPrompt(kind) {
    if(kind === 'hunkemoller') return "Hunkemoller commercial photography, studio lighting, hyper-detailed fabric, 85mm lens";
    if(kind === 'activewear') return "High contrast athletic styling, utilitarian aesthetic, dynamic lighting, technical fabric";
    if(kind === 'twoset') return "Fashion catalog layout, coordinated 2-piece set, brutalist backdrop, sharp focus";
    if(kind === 'social') return "Social media editorial framing, 35mm lens, raw film aesthetic, high engagement format";
    return "8K resolution, Hasselblad quality, industrial realism, cinematic lighting protocol";
}

function showLbFrame(){
  const p = activeSet[lbIndex];
  const holder = document.getElementById('lb-media-holder');
  holder.innerHTML = mediaTag(p, true);
  const mediaEl = holder.querySelector('img,video');
  if (mediaEl && mediaEl.tagName === 'IMG'){
    mediaEl.onclick = () => { zoomed = !zoomed; mediaEl.classList.toggle('zoomed', zoomed); };
  }
  document.getElementById('lb-cat-icon').innerHTML = icon(p.kind);
  document.getElementById('lb-title').textContent = `${p.title.toUpperCase()} // FRM ${lbIndex + 1} OF ${activeSet.length}`;
  document.getElementById('lb-download').href = p.src;
  document.getElementById('lb-download').setAttribute('download', p.file);
  document.getElementById('lb-prompt-text').textContent = getTechPrompt(p.kind);
  
  updateLbFavBtn();
  preloadNeighbors();
  renderFilmstrip();
  if (slidePlaying) armSlide();
}

function preloadNeighbors(){
  [1, -1].forEach(dir => {
    const idx = (lbIndex + dir + activeSet.length) % activeSet.length;
    const p = activeSet[idx];
    if (p && !p.video){ const img = new Image(); img.src = p.src; }
  });
}

function renderFilmstrip(){
  const strip = document.getElementById('filmstrip');
  strip.innerHTML = '';
  const frag = document.createDocumentFragment();
  activeSet.forEach((p, i) => {
    const el = document.createElement(p.video ? 'div' : 'img');
    el.className = 'fs-thumb' + (i === lbIndex ? ' active' : '');
    if (!p.video){ el.src = p.src; el.loading = 'lazy'; } else { el.innerHTML = icon('video'); el.style.cssText += 'display:flex;align-items:center;justify-content:center;background:#222;color:#fff;'; }
    el.onclick = () => { lbIndex = i; zoomed = false; showLbFrame(); };
    frag.appendChild(el);
  });
  strip.appendChild(frag);
  const activeThumb = strip.querySelector('.active');
  if (activeThumb) activeThumb.scrollIntoView({ inline: 'center', block: 'nearest' });
}

function navLb(dir){ lbIndex = (lbIndex + dir + activeSet.length) % activeSet.length; zoomed = false; showLbFrame(); }

function closeLb(){
  stopSlideshow();
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  document.body.style.overflow = '';
  if (document.fullscreenElement) document.exitFullscreen();
  setTimeout(() => {
    lb.style.display = 'none';
    document.getElementById('lb-media-holder').innerHTML = '';
  }, 300);
}
function toggleFullscreen(){
  const lb = document.getElementById('lightbox');
  if (!document.fullscreenElement) lb.requestFullscreen?.();
  else document.exitFullscreen?.();
}

document.addEventListener('keydown', e => {
  if (document.getElementById('board-modal-overlay').classList.contains('open')){
    if (e.key === 'Escape') closeBoardModal();
    return;
  }
  if (document.getElementById('lightbox').style.display !== 'flex'){
    if (e.key === '/' ){ e.preventDefault(); document.getElementById('search')?.focus(); }
    return;
  }
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowRight') navLb(1);
  if (e.key === 'ArrowLeft') navLb(-1);
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'p' || e.key === 'P') toggleSlideshow();
  if (e.key === 'b' || e.key === 'B') openBoardModal(activeSet[lbIndex].id);
  if (e.key === ' '){ e.preventDefault(); toggleFavInLb(); }
});

let touchStartX = 0;
document.getElementById('lb-stage').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.getElementById('lb-stage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) navLb(dx > 0 ? -1 : 1);
});

/* ============================================================
   MAGNETIC MICRO-INTERACTION
============================================================ */
const MAGNETIC_SELECTOR = '.btn, .tag-chip, .board-chip, .lb-btn, .b2b-btn';
const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let magneticEl = null;

function resetMagnetic(el){
  if (!el) return;
  el.style.transform = '';
}

if (!reduceMotion){
  document.addEventListener('mousemove', (e) => {
    const el = e.target.closest ? e.target.closest(MAGNETIC_SELECTOR) : null;
    if (el){
      if (magneticEl && magneticEl !== el) resetMagnetic(magneticEl);
      magneticEl = el;
      const r = el.getBoundingClientRect();
      const relX = e.clientX - r.left - r.width / 2;
      const relY = e.clientY - r.top - r.height / 2;
      const strength = 0.16;
      const maxPull = 6;
      const tx = Math.max(-maxPull, Math.min(maxPull, relX * strength));
      const ty = Math.max(-maxPull, Math.min(maxPull, relY * strength));
      el.style.transform = `translate3d(${tx}px, ${ty}px, 0)`;
    } else if (magneticEl){
      resetMagnetic(magneticEl);
      magneticEl = null;
    }
  }, { passive: true });

  document.addEventListener('mouseleave', () => {
    if (magneticEl){ resetMagnetic(magneticEl); magneticEl = null; }
  });
}

/* ============================================================
   FIXED INIT FUNCTION FOR ALL ICONS
============================================================ */
function initLbIcons(){
    const iconsById = {
        'lb-fullscreen': 'fullscreen', 
        'lb-download': 'download', 
        'lb-copy': 'copy', 
        'lb-board': 'boards', 
        'lb-play': 'play',
        'board-modal-close': 'close',
        'board-new-btn': 'plus'
    };
    for (let id in iconsById) {
        const el = document.getElementById(id);
        if (el) el.innerHTML = icon(iconsById[id]);
    }

    const closeBtn = document.querySelector('.lb-close');
    if (closeBtn) closeBtn.innerHTML = icon('close');
    
    const prevBtn = document.querySelector('.lb-nav.prev');
    if (prevBtn) prevBtn.innerHTML = icon('prev');
    
    const nextBtn = document.querySelector('.lb-nav.next');
    if (nextBtn) nextBtn.innerHTML = icon('next');
}

/* INITS */
window.addEventListener('DOMContentLoaded', () => {
    initLbIcons();
    updateSpeedBtn();
    render();
});
