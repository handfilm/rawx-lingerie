<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAWx_ARCHIVE_OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0a0a0a; --void2:#131313; --panel:#1a1a1a; --line:#2a2a2a;
  --white:#f2f2f2; --dim:#8a8a8a; --dim2:#5c5c5c;
  --green:#baff29; --red:#ff2e2e; --amber:#ffb020;
  --mono:'JetBrains Mono','Courier New',monospace;
  --dur:.18s;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--void);color:var(--white);font-family:var(--mono);margin:0;cursor:crosshair;}
button,input{font-family:var(--mono);cursor:crosshair;}
svg.icon{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;display:block;}
::selection{background:var(--green);color:var(--void);}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-track{background:var(--void2);}
::-webkit-scrollbar-thumb{background:var(--line);}
::-webkit-scrollbar-thumb:hover{background:var(--green);}

/* ============ HEADER ============ */
.site-header{background:var(--void);border-bottom:1px solid var(--line);padding:18px 22px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;position:relative;}
.site-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),transparent 40%,var(--red) 70%,transparent);}
.brand{display:flex;flex-direction:column;gap:4px;}
.site-title{font-size:2.4rem;font-weight:800;text-transform:uppercase;letter-spacing:-2px;line-height:.85;}
.site-title span{color:var(--green);}
.brand-sub{font-size:10px;letter-spacing:3px;color:var(--dim2);text-transform:uppercase;}
.header-stats{display:flex;gap:22px;flex-wrap:wrap;}
.hstat{display:flex;flex-direction:column;gap:2px;min-width:64px;}
.hstat b{font-size:1.3rem;font-weight:800;color:var(--white);line-height:1;}
.hstat span{font-size:9px;letter-spacing:1.5px;color:var(--dim2);text-transform:uppercase;}
.hstat.accent b{color:var(--green);}

/* ============ TOOLBAR ============ */
.toolbar{position:sticky;top:0;background:var(--void2);border-bottom:1px solid var(--line);display:flex;z-index:100;overflow-x:auto;align-items:stretch;backdrop-filter:blur(6px);}
.btn{padding:12px 16px;border:none;border-right:1px solid var(--line);background:transparent;color:var(--dim);display:flex;align-items:center;gap:7px;font-size:10px;letter-spacing:1px;text-transform:uppercase;transition:background var(--dur),color var(--dur);white-space:nowrap;}
.btn:hover{background:var(--panel);color:var(--white);}
.btn.active{background:var(--green);color:var(--void);font-weight:700;}
.btn.view-btn.active{background:var(--red);color:var(--white);}
.btn.fav-btn.active{background:var(--amber);color:var(--void);}
.search-wrap{display:flex;align-items:center;gap:8px;border-right:1px solid var(--line);padding:0 14px;color:var(--dim2);}
.search-wrap input{border:none;background:none;outline:none;font-size:12px;width:150px;color:var(--white);}
.search-wrap input::placeholder{color:var(--dim2);}
#status{margin-left:auto;padding:12px 16px;font-size:9px;align-self:center;text-transform:uppercase;white-space:nowrap;color:var(--dim2);letter-spacing:1px;}

/* ============ TAGBAR ============ */
.tagbar{display:flex;background:var(--void);overflow-x:auto;border-bottom:1px solid var(--line);}
.tag-chip{padding:10px 14px;border-right:1px solid var(--line);background:var(--void);color:var(--dim);display:flex;align-items:center;gap:7px;white-space:nowrap;font-size:10px;letter-spacing:.5px;text-transform:uppercase;transition:background var(--dur),color var(--dur);}
.tag-chip:hover{color:var(--white);background:var(--void2);}
.tag-chip.active{background:var(--green);color:var(--void);font-weight:700;}
.tag-count{opacity:.6;font-size:9px;}
.tag-chip.active .tag-count{opacity:.8;}

/* ============ STATS DASHBOARD (togglable) ============ */
.dash{display:none;background:var(--void2);border-bottom:1px solid var(--line);padding:16px 20px;gap:10px;flex-direction:column;}
.dash.open{display:flex;}
.dash-row{display:flex;align-items:center;gap:10px;font-size:10px;letter-spacing:.5px;text-transform:uppercase;}
.dash-label{width:110px;color:var(--dim);flex-shrink:0;}
.dash-bar-track{flex:1;height:8px;background:var(--panel);position:relative;overflow:hidden;}
.dash-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--amber));transition:width .4s ease;}
.dash-num{width:36px;text-align:right;color:var(--dim2);flex-shrink:0;}

/* ============ GALLERY ============ */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:2px;background:var(--line);border-top:1px solid var(--line);min-height:200px;}
.gallery.masonry{display:block;columns:260px;column-gap:2px;}
.gallery.masonry .card{break-inside:avoid;margin-bottom:2px;aspect-ratio:auto;}
.gallery.list{display:block;}
.gallery.list .card{aspect-ratio:auto;display:flex;align-items:center;border-bottom:1px solid var(--line);}
.gallery.list .card .media-wrap{width:120px;height:90px;flex-shrink:0;}
.gallery.list .card-meta{position:static;opacity:1;background:none;padding:10px 14px;color:var(--white);transform:none;flex:1;}

.card{position:relative;background:var(--void2);overflow:hidden;aspect-ratio:1;}
.media-wrap{position:relative;width:100%;height:100%;background:linear-gradient(110deg,#161616 30%,#1e1e1e 50%,#161616 70%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
.media-wrap.loaded{animation:none;background:none;}
@keyframes shimmer{to{background-position-x:-200%;}}
.card img,.card video{width:100%;height:100%;object-fit:cover;filter:grayscale(35%) brightness(.92);transition:transform .35s,opacity .3s,filter .3s;display:block;cursor:zoom-in;opacity:0;}
.card img.loaded,.card video.loaded{opacity:1;}
.card:hover img,.card:hover video{transform:scale(1.06);filter:grayscale(0%) brightness(1);}
.gallery.list .card:hover img,.gallery.list .card:hover video{transform:none;}
.card-meta{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.9));color:var(--white);padding:24px 10px 8px;font-size:9px;text-transform:uppercase;letter-spacing:1px;opacity:0;transition:opacity var(--dur);pointer-events:none;display:flex;justify-content:space-between;align-items:flex-end;}
.card:hover .card-meta{opacity:1;}
.gallery.list .card-meta{opacity:1;}
.card-tags{font-size:9px;color:var(--green);margin-top:2px;}
.cat-icon{color:var(--green);opacity:.9;flex-shrink:0;}
.fav-toggle{position:absolute;top:8px;left:8px;z-index:3;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);color:var(--white);width:26px;height:26px;display:flex;align-items:center;justify-content:center;transition:background var(--dur),color var(--dur),border-color var(--dur);pointer-events:auto;}
.fav-toggle svg{width:13px;height:13px;}
.fav-toggle:hover{border-color:var(--amber);}
.fav-toggle.active{background:var(--amber);color:var(--void);border-color:var(--amber);}
.video-badge{position:absolute;top:8px;right:8px;background:var(--red);color:var(--white);padding:4px;z-index:2;display:flex;}
.video-badge svg{width:11px;height:11px;stroke:var(--white);}
.empty-state{color:var(--dim2);text-transform:uppercase;font-size:11px;padding:70px 20px;text-align:center;background:var(--void2);grid-column:1/-1;display:flex;flex-direction:column;align-items:center;gap:12px;letter-spacing:1px;}

/* infinite-scroll sentinel */
#sentinel{grid-column:1/-1;height:1px;}
.load-more-wrap{grid-column:1/-1;display:flex;justify-content:center;padding:18px;background:var(--void2);}
.load-more-btn{background:var(--panel);border:1px solid var(--line);color:var(--dim);padding:10px 22px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;}
.load-more-btn:hover{border-color:var(--green);color:var(--green);}

/* ============ LIGHTBOX ============ */
#lightbox{display:none;position:fixed;inset:0;background:rgba(6,6,6,.98);z-index:1000;flex-direction:column;}
.lb-top{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;color:var(--white);font-size:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--line);}
.lb-title-wrap{display:flex;align-items:center;gap:10px;min-width:0;}
.lb-title-wrap .cat-icon{flex-shrink:0;}
#lb-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-actions{display:flex;gap:8px;flex-shrink:0;}
.lb-btn{background:none;border:1px solid var(--line);color:var(--white);padding:8px;display:flex;align-items:center;justify-content:center;}
.lb-btn:hover{background:var(--green);color:var(--void);border-color:var(--green);}
.lb-btn.active{background:var(--amber);color:var(--void);border-color:var(--amber);}
.lb-btn-text{font-size:10px;font-weight:700;letter-spacing:.5px;padding:8px 10px;min-width:34px;}
.lb-close:hover{background:var(--red);border-color:var(--red);color:var(--white);}
.lb-progress{position:absolute;top:0;left:0;height:2px;background:var(--green);width:0%;z-index:5;transition:none;}
.lb-progress.running{transition:width linear;}
.lb-stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;padding:0 68px;touch-action:pan-y;}
.lb-stage img,.lb-stage video{max-width:100%;max-height:76vh;outline:1px solid var(--line);cursor:zoom-in;transition:transform .25s ease;}
.lb-stage img.zoomed{max-width:none;max-height:none;height:130vh;cursor:zoom-out;}
.lb-nav{position:absolute;top:0;bottom:0;width:68px;background:none;border:none;color:var(--white);display:flex;align-items:center;justify-content:center;opacity:.45;}
.lb-nav svg{width:26px;height:26px;}
.lb-nav:hover{opacity:1;background:rgba(255,255,255,.04);}
.lb-nav.prev{left:0;}.lb-nav.next{right:0;}
.lb-bottom{padding:8px 20px 4px;color:var(--dim2);font-size:10px;text-transform:uppercase;letter-spacing:1px;text-align:center;}
.filmstrip{display:flex;gap:4px;overflow-x:auto;padding:10px 20px 16px;}
.fs-thumb{width:52px;height:52px;object-fit:cover;opacity:.35;filter:grayscale(70%);flex-shrink:0;border:2px solid transparent;}
.fs-thumb.active{opacity:1;filter:grayscale(0%);border-color:var(--green);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:var(--void);padding:10px 18px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;z-index:2000;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media (max-width:640px){
  .site-title{font-size:1.7rem;}
  .header-stats{gap:14px;}
  .lb-stage{padding:0 30px;}
  .lb-nav{width:30px;}
  .lb-nav svg{width:18px;height:18px;}
  .filmstrip{display:none;}
  .dash-label{width:80px;}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="brand">
    <div class="site-title">RAWx_<span>ARCHIVE</span></div>
    <div class="brand-sub">OS // asset engine v2</div>
  </div>
  <div class="header-stats">
    <div class="hstat accent"><b id="stat-total"></b><span>Total Frames</span></div>
    <div class="hstat"><b id="stat-visible"></b><span>Visible</span></div>
    <div class="hstat"><b id="stat-cats"></b><span>Categories</span></div>
    <div class="hstat"><b id="stat-fav"></b><span>Favorites</span></div>
  </div>
</header>

<div class="toolbar" id="toolbar"></div>
<div class="tagbar" id="tagbar"></div>
<div class="dash" id="dash"></div>
<div class="gallery" id="grid"></div>

<!-- Lightbox -->
<div id="lightbox">
  <div class="lb-top">
    <div class="lb-title-wrap"><span class="cat-icon" id="lb-cat-icon"></span><span id="lb-title">FRAME</span></div>
    <div class="lb-actions">
      <button class="lb-btn" id="lb-fav" onclick="toggleFavInLb()" title="Favorite"></button>
      <button class="lb-btn" id="lb-copy" onclick="copyLbPath()" title="Copy filename"></button>
      <button class="lb-btn lb-btn-text" id="lb-speed" onclick="cycleSpeed()" title="Slideshow speed"></button>
      <button class="lb-btn" id="lb-play" onclick="toggleSlideshow()" title="Slideshow"></button>
      <button class="lb-btn" id="lb-fullscreen" onclick="toggleFullscreen()" title="Fullscreen"></button>
      <a class="lb-btn" id="lb-download" download title="Download"></a>
      <button class="lb-btn lb-close" onclick="closeLb()" title="Close"></button>
    </div>
  </div>
  <div class="lb-stage" id="lb-stage">
    <div class="lb-progress" id="lb-progress"></div>
    <button class="lb-nav prev" onclick="navLb(-1)" title="Previous"></button>
    <div id="lb-media-holder" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;"></div>
    <button class="lb-nav next" onclick="navLb(1)" title="Next"></button>
  </div>
  <div class="lb-bottom" id="lb-counter"></div>
  <div class="filmstrip" id="filmstrip"></div>
</div>

<div class="toast" id="toast"></div>

function seededShuffle(arr, seed){
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 9301 + 49297) % 233280;
    const j = Math.floor((s / 233280) * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  let data = [...photos];
  if (state.tag) data = data.filter(p => p.kind === state.tag);
  if (state.favOnly) data = data.filter(p => favorites.has(p.id));
  if (state.query){
    const q = state.query.toLowerCase();
    data = data.filter(p => p.title.toLowerCase().includes(q) || p.kind.toLowerCase().includes(q) || p.file.toLowerCase().includes(q));
  }
  if (state.mode === 'az') data.sort((a,b) => a.title.localeCompare(b.title));
  else if (state.mode === 'shuffle') data = seededShuffle(data, shuffleSeed);
  else if (state.mode === 'newest') data = [...data].reverse();
  return data;
}

/* ============================================================
   RENDER — TOOLBAR
============================================================ */
function renderToolbar(){
  const tb = document.getElementById('toolbar');
  tb.innerHTML = `
    <button class="btn ${state.mode==='all'?'active':''}" onclick="setMode('all')">${icon('all')}<span>All</span></button>
    <button class="btn ${state.mode==='newest'?'active':''}" onclick="setMode('newest')">${icon('newest')}<span>Newest</span></button>
    <button class="btn ${state.mode==='az'?'active':''}" onclick="setMode('az')">${icon('az')}<span>A–Z</span></button>
    <button class="btn ${state.mode==='shuffle'?'active':''}" onclick="reshuffle()">${icon('shuffle')}<span>Shuffle</span></button>
    <button class="btn fav-btn ${state.favOnly?'active':''}" onclick="toggleFavOnly()">${icon(state.favOnly?'starFill':'star')}<span>Favs</span></button>
    <button class="btn view-btn ${state.view==='grid'?'active':''}" onclick="setView('grid')">${icon('grid')}</button>
    <button class="btn view-btn ${state.view==='masonry'?'active':''}" onclick="setView('masonry')">${icon('masonry')}</button>
    <button class="btn view-btn ${state.view==='list'?'active':''}" onclick="setView('list')">${icon('list')}</button>
    <button class="btn ${state.dash?'active':''}" onclick="toggleDash()">${icon('dash')}<span>Stats</span></button>
    <div class="search-wrap">${icon('search')}<input id="search" placeholder="SEARCH FRAMES" oninput="onSearch(this.value)"></div>
    <div id="status"></div>
  `;
  document.getElementById('search').value = state.query;
}

/* ============================================================
   RENDER — TAGBAR
============================================================ */
function renderTagbar(){
  const bar = document.getElementById('tagbar');
  bar.innerHTML = '';
  const allChip = document.createElement('div');
  allChip.className = 'tag-chip' + (state.tag === null ? ' active' : '');
  allChip.innerHTML = `${icon('all')}<span>All</span><span class="tag-count">${photos.length}</span>`;
  allChip.onclick = () => { state.tag = null; resetPaging(); render(); };
  bar.appendChild(allChip);
  SECTIONS.forEach(sec => {
    const count = photos.filter(p => p.kind === sec.key).length;
    if (!count) return;
    const chip = document.createElement('div');
    chip.className = 'tag-chip' + (state.tag === sec.key ? ' active' : '');
    chip.innerHTML = `<span class="cat-icon">${icon(sec.key)}</span><span>${sec.label}</span><span class="tag-count">${count}</span>`;
    chip.onclick = () => { state.tag = (state.tag === sec.key ? null : sec.key); resetPaging(); render(); };
    bar.appendChild(chip);
  });
}

/* ============================================================
   RENDER — DASHBOARD
============================================================ */
function renderDash(){
  const dash = document.getElementById('dash');
  dash.className = 'dash' + (state.dash ? ' open' : '');
  if (!state.dash) { dash.innerHTML = ''; return; }
  const max = Math.max(...SECTIONS.map(s => photos.filter(p => p.kind === s.key).length));
  dash.innerHTML = SECTIONS.map(sec => {
    const count = photos.filter(p => p.kind === sec.key).length;
    if (!count) return '';
    const pct = Math.round((count / max) * 100);
    return `<div class="dash-row">
      <span class="dash-label">${sec.label}</span>
      <div class="dash-bar-track"><div class="dash-bar-fill" style="width:${pct}%"></div></div>
      <span class="dash-num">${count}</span>
    </div>`;
  }).join('');
}

/* ============================================================
   MEDIA TAG
============================================================ */
function mediaTag(p, forLightbox){
  if (p.video){
    return `<video src="${p.src}" ${forLightbox ? 'controls autoplay' : 'muted loop playsinline'} preload="metadata" onloadeddata="this.classList.add('loaded');this.parentElement.classList.add('loaded')"></video>`;
  }
  return `<img src="${p.src}" alt="${p.title}" loading="lazy" onload="this.classList.add('loaded');this.parentElement.classList.add('loaded')" onerror="this.parentElement.classList.add('loaded');this.alt='MISSING: ${p.file}'">`;
}

/* ============================================================
   RENDER — GRID (chunked / infinite-scroll for speed)
============================================================ */
function resetPaging(){ visibleCount = BATCH; }

function render(){
  renderToolbar();
  renderDash();
  const grid = document.getElementById('grid');
  grid.className = 'gallery ' + state.view;
  grid.innerHTML = '';

  activeSet = getFiltered();

  if (!activeSet.length){
    grid.innerHTML = `<div class="empty-state">${icon('search')}<span>NO FRAMES MATCH</span></div>`;
  } else {
    const slice = activeSet.slice(0, visibleCount);
    const frag = document.createDocumentFragment();
    slice.forEach(p => frag.appendChild(buildCard(p)));
    grid.appendChild(frag);

    if (visibleCount < activeSet.length){
      const sentinel = document.createElement('div');
      sentinel.id = 'sentinel';
      grid.appendChild(sentinel);
      observeSentinel(sentinel);
    }
  }

  document.getElementById('status').textContent = `${Math.min(visibleCount, activeSet.length)} / ${activeSet.length} SHOWN`;
  document.getElementById('stat-total').textContent = photos.length;
  document.getElementById('stat-visible').textContent = activeSet.length;
  document.getElementById('stat-cats').textContent = SECTIONS.filter(s => photos.some(p => p.kind === s.key)).length;
  document.getElementById('stat-fav').textContent = favorites.size;
  renderTagbar();
}

function buildCard(p){
  const div = document.createElement('div');
  div.className = 'card';
  const isFav = favorites.has(p.id);
  div.innerHTML = `
    <button class="fav-toggle ${isFav ? 'active' : ''}" onclick="event.stopPropagation();toggleFav(${p.id})">${icon(isFav ? 'starFill' : 'star')}</button>
    <div class="media-wrap" onclick="openLb(${p.id})">
      ${p.video ? `<div class="video-badge">${icon('video')}</div>` : ''}
      ${mediaTag(p, false)}
    </div>
    <div class="card-meta"><span>${p.title}</span><span class="cat-icon">${icon(p.kind)}</span></div>
  `;
  return div;
}

function observeSentinel(el){
  if (io) io.disconnect();
  io = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting){
        visibleCount = Math.min(visibleCount + BATCH, activeSet.length);
        render();
      }
    });
  }, { rootMargin: '600px' });
  io.observe(el);
}

function setMode(mode){ state.mode = mode; resetPaging(); render(); }
function reshuffle(){ shuffleSeed = Date.now() % 100000; state.mode = 'shuffle'; resetPaging(); render(); }
function setView(view){ state.view = view; resetPaging(); render(); }
function onSearch(val){ state.query = val.trim(); resetPaging(); render(); }
function toggleFavOnly(){ state.favOnly = !state.favOnly; resetPaging(); render(); }
function toggleDash(){ state.dash = !state.dash; render(); }
function toggleFav(id){
  if (favorites.has(id)) favorites.delete(id); else favorites.add(id);
  saveFavs();
  render();
  if (document.getElementById('lightbox').style.display === 'flex') updateLbFavBtn();
}

/* ============================================================
   TOAST
============================================================ */
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
}

/* ============================================================
   LIGHTBOX / CINEMA MODE
============================================================ */
function initLbIcons(){
  document.getElementById('lb-fullscreen').innerHTML = icon('fullscreen');
  document.getElementById('lb-download').innerHTML = icon('download');
  document.getElementById('lb-copy').innerHTML = icon('copy');
  document.getElementById('lb-play').innerHTML = icon('play');
  document.querySelector('.lb-close').innerHTML = icon('close');
  document.querySelector('.lb-nav.prev').innerHTML = icon('prev');
  document.querySelector('.lb-nav.next').innerHTML = icon('next');
  updateSpeedBtn();
}

/* ============================================================
   SLIDESHOW
============================================================ */
const SPEED_OPTIONS = [1.5, 2, 3, 5, 8, 12];
let speedIndex = 2; // default 3s
let slideTimer = null;
let slidePlaying = false;

function updateSpeedBtn(){
  document.getElementById('lb-speed').textContent = SPEED_OPTIONS[speedIndex] + 'S';
}
function cycleSpeed(){
  speedIndex = (speedIndex + 1) % SPEED_OPTIONS.length;
  updateSpeedBtn();
  if (slidePlaying) armSlide();
}

function updatePlayBtn(){
  const btn = document.getElementById('lb-play');
  btn.innerHTML = icon(slidePlaying ? 'pause' : 'play');
  btn.classList.toggle('active', slidePlaying);
}

function toggleSlideshow(){
  slidePlaying ? stopSlideshow() : startSlideshow();
}

function startSlideshow(){
  slidePlaying = true;
  updatePlayBtn();
  armSlide();
}

function stopSlideshow(){
  slidePlaying = false;
  updatePlayBtn();
  clearTimeout(slideTimer);
  const bar = document.getElementById('lb-progress');
  bar.classList.remove('running');
  bar.style.width = '0%';
}

function armSlide(){
  clearTimeout(slideTimer);
  const secs = SPEED_OPTIONS[speedIndex];
  const bar = document.getElementById('lb-progress');
  bar.classList.remove('running');
  bar.style.width = '0%';
  void bar.offsetWidth;
  requestAnimationFrame(() => {
    bar.classList.add('running');
    bar.style.transitionDuration = secs + 's';
    bar.style.width = '100%';
  });
  slideTimer = setTimeout(() => { if (slidePlaying) navLb(1); }, secs * 1000);
}

function openLb(id){
  lbIndex = activeSet.findIndex(p => p.id === id);
  zoomed = false;
  showLbFrame();
  document.getElementById('lightbox').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function updateLbFavBtn(){
  const p = activeSet[lbIndex];
  const btn = document.getElementById('lb-fav');
  const isFav = favorites.has(p.id);
  btn.innerHTML = icon(isFav ? 'starFill' : 'star');
  btn.classList.toggle('active', isFav);
}

function toggleFavInLb(){
  const p = activeSet[lbIndex];
  toggleFav(p.id);
}

function copyLbPath(){
  const p = activeSet[lbIndex];
  const text = BASE + p.file;
  if (navigator.clipboard){
    navigator.clipboard.writeText(text).then(() => showToast('PATH COPIED')).catch(() => showToast('COPY FAILED'));
  } else {
    showToast('COPY UNSUPPORTED');
  }
}

function showLbFrame(){
  const p = activeSet[lbIndex];
  const holder = document.getElementById('lb-media-holder');
  holder.innerHTML = mediaTag(p, true);
  const mediaEl = holder.querySelector('img,video');
  if (mediaEl && mediaEl.tagName === 'IMG'){
    mediaEl.onclick = () => { zoomed = !zoomed; mediaEl.classList.toggle('zoomed', zoomed); };
  }
  const sec = SECTIONS.find(s => s.key === p.kind);
  document.getElementById('lb-cat-icon').innerHTML = icon(p.kind);
  document.getElementById('lb-title').textContent = p.title.toUpperCase();
  document.getElementById('lb-counter').textContent = `FRAME ${lbIndex + 1} / ${activeSet.length} — ${sec ? sec.label.toUpperCase() : ''}`;
  document.getElementById('lb-download').href = p.src;
  document.getElementById('lb-download').setAttribute('download', p.file);
  updateLbFavBtn();
  preloadNeighbors();
  renderFilmstrip();
  if (slidePlaying) armSlide();
}

function preloadNeighbors(){
  [1, -1].forEach(dir => {
    const idx = (lbIndex + dir + activeSet.length) % activeSet.length;
    const p = activeSet[idx];
    if (p && !p.video){ const img = new Image(); img.src = p.src; }
  });
}

function renderFilmstrip(){
  const strip = document.getElementById('filmstrip');
  strip.innerHTML = '';
  const frag = document.createDocumentFragment();
  activeSet.forEach((p, i) => {
    const el = document.createElement(p.video ? 'div' : 'img');
    el.className = 'fs-thumb' + (i === lbIndex ? ' active' : '');
    if (!p.video){ el.src = p.src; el.loading = 'lazy'; } else { el.innerHTML = icon('video'); el.style.cssText += 'display:flex;align-items:center;justify-content:center;background:#222;color:#fff;'; }
    el.onclick = () => { lbIndex = i; zoomed = false; showLbFrame(); };
    frag.appendChild(el);
  });
  strip.appendChild(frag);
  const activeThumb = strip.querySelector('.active');
  if (activeThumb) activeThumb.scrollIntoView({ inline: 'center', block: 'nearest' });
}

function navLb(dir){ lbIndex = (lbIndex + dir + activeSet.length) % activeSet.length; zoomed = false; showLbFrame(); }

function closeLb(){
  stopSlideshow();
  document.getElementById('lightbox').style.display = 'none';
  document.getElementById('lb-media-holder').innerHTML = '';
  document.body.style.overflow = '';
  if (document.fullscreenElement) document.exitFullscreen();
}
function toggleFullscreen(){
  const lb = document.getElementById('lightbox');
  if (!document.fullscreenElement) lb.requestFullscreen?.();
  else document.exitFullscreen?.();
}

document.addEventListener('keydown', e => {
  if (document.getElementById('lightbox').style.display !== 'flex'){
    if (e.key === '/' ){ e.preventDefault(); document.getElementById('search')?.focus(); }
    return;
  }
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowRight') navLb(1);
  if (e.key === 'ArrowLeft') navLb(-1);
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'p' || e.key === 'P') toggleSlideshow();
  if (e.key === ' '){ e.preventDefault(); toggleFavInLb(); }
});

let touchStartX = 0;
document.getElementById('lb-stage').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.getElementById('lb-stage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) navLb(dx > 0 ? -1 : 1);
});

initLbIcons();
render();
</script>
</body>
</html>
